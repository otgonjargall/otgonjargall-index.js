<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shoo</title>
    <link rel="stylesheet" href="shoo.css" />
  </head>
  <body>
    <div class="Game">
      <div class="score">
        <div class="onoo">
          <div class="player1">
            <span>PLAYER X</span>
            <h1>o</h1>
          </div>
          <div class="draw">
            <span>Dram</span>
            <h1>o</h1>
          </div>
          <div class="player2">
            <span>Player O</span>
            <h1>o</h1>
          </div>
        </div>
        <div class="board" id="board">
          <div class="cell" onclick="addXandO(0)"></div>
          <div class="cell" onclick="addXandO(1)"></div>
          <div class="cell" onclick="addXandO(2)"></div>
          <div class="cell" onclick="addXandO(3)"></div>
          <div class="cell" onclick="addXandO(4)"></div>
          <div class="cell" onclick="addXandO(5)"></div>
          <div class="cell" onclick="addXandO(6)"></div>
          <div class="cell" onclick="addXandO(7)"></div>
          <div class="cell" onclick="addXandO(8)"></div>
        </div>
        <button class="button" onclick="resetGame()">New Game</button>
      </div>
    </div>

    <script src="shoo.js"></script>
  </body>
</html>
