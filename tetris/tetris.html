<!doctype html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <title>Тетрис</title>
    <link rel="stylesheet" href="tetris.css" />
  </head>
  <body>
    <div
      style="
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #4a1a8a;
        font-family: sans-serif;
      "
    >
      <div style="display: flex; align-items: flex-start; gap: 20px">
        <div style="position: relative">
          <canvas
            id="tetris"
            width="240"
            height="480"
            style="display: block; border-radius: 12px; background: #0d0820"
          ></canvas>
          <div
            id="game-over"
            style="
              position: absolute;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              background: rgba(20, 10, 50, 0.82);
              border-radius: 12px;
              display: none;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              color: #fff;
              font-size: 22px;
              font-weight: 700;
              gap: 10px;
            "
          >
            Тоглоом дууслаа!
            <span
              id="final-score"
              style="font-size: 13px; color: #c4b5fd"
            ></span>
          </div>
        </div>

        <div
          style="
            background: #1a1033;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 140px;
          "
        >
          <div>
            <div
              style="
                color: #9c8fc0;
                font-size: 12px;
                font-weight: 500;
                letter-spacing: 1px;
                margin-bottom: 2px;
              "
            >
              ОНОО
            </div>
            <div
              id="score-val"
              style="color: #fff; font-size: 26px; font-weight: 700"
            >
              0
            </div>
          </div>
          <div>
            <div
              style="
                color: #9c8fc0;
                font-size: 12px;
                font-weight: 500;
                letter-spacing: 1px;
                margin-bottom: 2px;
              "
            >
              ТҮВШИН
            </div>
            <div
              id="level-val"
              style="color: #fff; font-size: 26px; font-weight: 700"
            >
              1
            </div>
          </div>
          <div>
            <div
              style="
                color: #9c8fc0;
                font-size: 12px;
                font-weight: 500;
                letter-spacing: 1px;
                margin-bottom: 2px;
              "
            >
              МӨР
            </div>
            <div
              id="lines-val"
              style="color: #fff; font-size: 26px; font-weight: 700"
            >
              0
            </div>
          </div>
          <div>
            <div
              style="
                color: #9c8fc0;
                font-size: 12px;
                font-weight: 500;
                letter-spacing: 1px;
                margin-bottom: 4px;
              "
            >
              ДАРААГИЙН
            </div>
            <canvas
              id="next-canvas"
              width="80"
              height="80"
              style="display: block; border-radius: 8px; background: #0d0820"
            ></canvas>
          </div>
          <button
            id="start-btn"
            onclick="startGame()"
            style="
              width: 100%;
              padding: 10px;
              border-radius: 10px;
              border: none;
              background: #7c3aed;
              color: #fff;
              font-size: 14px;
              font-weight: 600;
              cursor: pointer;
            "
          >
            Эхлэх
          </button>
          <button
            id="pause-btn"
            onclick="togglePause()"
            style="
              width: 100%;
              padding: 10px;
              border-radius: 10px;
              border: none;
              background: #4a1a8a;
              color: #fff;
              font-size: 14px;
              font-weight: 600;
              cursor: pointer;
            "
          >
            Пауз
          </button>
          <div style="color: #7c6aaa; font-size: 11px; line-height: 1.9">
            ← → Хөдлөх<br />
            ↑ Эргүүлэх<br />
            ↓ Хурдан<br />
            Зай Унагах
          </div>
        </div>
      </div>
    </div>

    <script></script>
    <script src="tetris.js"></script>
  </body>
</html>
